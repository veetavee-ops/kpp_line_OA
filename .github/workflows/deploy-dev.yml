name: Deploy LINE OA (Dev)

on:
  push:
    branches: [dev2]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: veetavee/lineoa:dev

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_DEV }}
          username: ${{ secrets.SERVER_USER_DEV }}
          password: ${{ secrets.SERVER_PASSWORD_DEV }}
          source: docker-compose.yml
          target: /home/worker/lineoa-dev

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST_DEV }}
          username: ${{ secrets.SERVER_USER_DEV }}
          password: ${{ secrets.SERVER_PASSWORD_DEV }}
          script: |
            cd /home/worker/lineoa-dev
            export IMAGE_TAG=dev
            docker compose down --remove-orphans || true
            docker stop lineoa-app 2>/dev/null; docker rm lineoa-app 2>/dev/null; true
            lsof -ti:3000 | xargs -r kill -9 || true
            docker compose pull
            docker compose up -d
